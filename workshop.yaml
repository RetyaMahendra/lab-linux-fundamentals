apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-linux-sysadmin
  labels:
    training.educates.dev/workshop: lab-linux-sysadmin
spec:
  title: "Linux System Administration Fundamentals"
  description: |
    A comprehensive hands-on workshop covering Linux system administration
    on Ubuntu Server 24.04 LTS. Designed for beginners with basic IT knowledge,
    this 4-hour workshop covers the command line, filesystem management, users
    and permissions, package management, process control, and networking.
    Students get a dedicated Ubuntu environment with sudo access.

  duration: 240m

  workshop:
    image: ghcr.io/educates/educates-base-environment:3.7.3
    files:
    - git:
        url: https://github.com/RetyaMahendra/lab-linux-fundamentals
        ref: origin/main

  session:
    namespaces:
      budget: medium
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true